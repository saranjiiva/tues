<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedCO Assess — Student Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --accent:#2563eb;
      --accent2:#1d4ed8;
      --text:#f8fafc;
      --muted:#94a3b8;
      --danger:#ef4444;
      --success:#22c55e;
      --border:rgba(255,255,255,0.08);
      --shadow:0 20px 40px rgba(0,0,0,0.35);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      min-height:100vh;
      background:
        radial-gradient(circle at top right, rgba(37,99,235,0.22), transparent 35%),
        radial-gradient(circle at bottom left, rgba(29,78,216,0.18), transparent 40%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:1100px;
      display:grid;
      grid-template-columns:1.1fr 0.9fr;
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      backdrop-filter:blur(18px);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow);
    }

    .left-panel{
      padding:60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:14px;
      margin-bottom:30px;
    }

    .logo{
      width:60px;
      height:60px;
      border-radius:18px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:800;
    }

    .headline{
      font-size:42px;
      line-height:1.15;
      font-weight:800;
      margin-bottom:20px;
    }

    .headline span{
      color:#60a5fa;
    }

    .description{
      color:var(--muted);
      font-size:17px;
      line-height:1.8;
    }

    .right-panel{
      background:rgba(2,6,23,0.78);
      padding:50px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .login-card h2{
      font-size:32px;
      margin-bottom:10px;
      font-weight:800;
    }

    .login-card p{
      color:var(--muted);
      margin-bottom:30px;
    }

    .form-group{
      margin-bottom:22px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      font-size:14px;
      font-weight:600;
    }

    .form-group input{
      width:100%;
      padding:16px 18px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);
      color:white;
      font-size:16px;
      outline:none;
    }

    .btn{
      width:100%;
      padding:16px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      font-size:17px;
      font-weight:700;
      cursor:pointer;
    }

    .status{
      margin-top:20px;
      padding:14px;
      border-radius:12px;
      font-size:14px;
      display:none;
    }

    .status.error{
      display:block;
      background:rgba(239,68,68,0.12);
      color:#fecaca;
    }

    .status.success{
      display:block;
      background:rgba(34,197,94,0.12);
      color:#bbf7d0;
    }

    @media(max-width:950px){
      .container{
        grid-template-columns:1fr;
      }

      .left-panel{
        display:none;
      }

      .right-panel{
        padding:35px 28px;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- LEFT -->
  <div class="left-panel">
    <div class="brand">
      <div class="logo">MCQ</div>
      <div>
        <h1>MedCO Assess</h1>
        <p>Course Outcome Based Smart Assessment Platform</p>
      </div>
    </div>

    <div class="headline">
      Smart MCQ Testing for <span>Students & CO Analytics</span>
    </div>

    <div class="description">
      Login with Name and Roll Number, wait for faculty dispatch,
      answer randomized questions, and receive CO-based performance.
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="login-card">
      <h2>Student Login</h2>
      <p>Enter your details exactly as instructed.</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="studentName">Full Name</label>
          <input type="text" id="studentName" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
          <label for="rollNumber">Roll Number</label>
          <input type="text" id="rollNumber" placeholder="Enter your roll number" required>
        </div>

        <button type="submit" class="btn">
          Enter Waiting Room
        </button>
      </form>

      <div id="statusMessage" class="status"></div>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    doc,
    setDoc,
    getDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCxCexZLH3m2bni7wZ3Wqvs3BzJHzh9fxc",
    authDomain: "tues-2f354.firebaseapp.com",
    databaseURL: "https://tues-2f354-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "tues-2f354",
    storageBucket: "tues-2f354.firebasestorage.app",
    messagingSenderId: "41087849708",
    appId: "1:41087849708:web:25c1f91d54858a2111c1c9",
    measurementId: "G-S6Z5JJ97CB"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const loginForm = document.getElementById("loginForm");
  const statusMessage = document.getElementById("statusMessage");

  function showStatus(message, type){
    statusMessage.className = `status ${type}`;
    statusMessage.textContent = message;
  }

  function getBasePath(){
    return window.location.pathname.includes("/medco-assess/")
      ? "/medco-assess/"
      : "./";
  }

  function goToWaitingRoom(){
    window.location.href = `${getBasePath()}waiting-room.html`;
  }

  loginForm.addEventListener("submit", async function(e){
    e.preventDefault();

    const studentName = document.getElementById("studentName").value.trim();
    const rollNumber = document.getElementById("rollNumber").value.trim().toUpperCase();

    if(!studentName || !rollNumber){
      showStatus("Please enter both Name and Roll Number.", "error");
      return;
    }

    try{
      const studentRef = doc(db, "students", rollNumber);
      const existingStudent = await getDoc(studentRef);

      if(existingStudent.exists()){
        showStatus("Roll Number already used in this session.", "error");
        return;
      }

      await setDoc(studentRef,{
        name: studentName,
        rollNumber: rollNumber,
        loginTime: serverTimestamp(),
        status: "waiting",
        currentQuestion: 0,
        score: 0,
        totalQuestions: 50,
        sessionId: null
      });

      localStorage.setItem("studentName", studentName);
      localStorage.setItem("rollNumber", rollNumber);

      showStatus("Login successful! Redirecting...", "success");

      setTimeout(() => {
        goToWaitingRoom();
      }, 1200);

    }catch(error){
      console.error("Login Error:", error);
      showStatus(`Error: ${error.message}`, "error");
    }
  });

</script>

</body>
</html>
