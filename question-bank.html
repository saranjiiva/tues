<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedCO Assess — Question Bank Management</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#020617;
      --panel:#0f172a;
      --card:#111827;
      --text:#f8fafc;
      --muted:#94a3b8;
      --primary:#2563eb;
      --primary2:#1d4ed8;
      --success:#22c55e;
      --danger:#ef4444;
      --warning:#f59e0b;
      --border:rgba(255,255,255,0.08);
      --shadow:0 20px 40px rgba(0,0,0,0.35);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Inter',sans-serif;
    }

    body{
      background:
        radial-gradient(circle at top right, rgba(37,99,235,0.10), transparent 35%),
        radial-gradient(circle at bottom left, rgba(29,78,216,0.08), transparent 35%),
        var(--bg);
      color:var(--text);
      min-height:100vh;
      padding:24px;
    }

    .container{
      max-width:1600px;
      margin:auto;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      flex-wrap:wrap;
      gap:16px;
      margin-bottom:28px;
    }

    .topbar h1{
      font-size:34px;
      font-weight:800;
    }

    .topbar p{
      color:var(--muted);
      margin-top:6px;
    }

    .nav-buttons{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      padding:14px 20px;
      border:none;
      border-radius:16px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
      transition:0.25s;
    }

    .btn:hover{
      transform:translateY(-2px);
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--primary),var(--primary2));
      color:white;
    }

    .btn-danger{
      background:rgba(239,68,68,0.15);
      color:#fecaca;
    }

    .btn-success{
      background:rgba(34,197,94,0.15);
      color:#bbf7d0;
    }

    .grid{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:24px;
    }

    /* FORM */
    .form-card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:28px;
      padding:26px;
      box-shadow:var(--shadow);
      height:fit-content;
      position:sticky;
      top:20px;
    }

    .form-card h2{
      font-size:24px;
      margin-bottom:20px;
      font-weight:800;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      color:#cbd5e1;
      font-size:14px;
      font-weight:600;
    }

    .form-group input,
    .form-group textarea,
    .form-group select{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);
      color:white;
      font-size:14px;
      outline:none;
    }

    textarea{
      min-height:100px;
      resize:vertical;
    }

    .option-grid{
      display:grid;
      gap:12px;
    }

    .helper{
      font-size:12px;
      color:var(--muted);
      margin-top:6px;
    }

    /* TABLE */
    .table-card{
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:28px;
      padding:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .search-bar{
      margin-bottom:18px;
    }

    .search-bar input{
      width:100%;
      padding:14px;
      border-radius:14px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.04);
      color:white;
      font-size:14px;
      outline:none;
    }

    .table-wrap{
      overflow-x:auto;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:1100px;
    }

    th, td{
      padding:14px;
      text-align:left;
      border-bottom:1px solid var(--border);
      vertical-align:top;
      font-size:14px;
    }

    th{
      background:rgba(37,99,235,0.14);
      color:#bfdbfe;
      font-size:13px;
    }

    .badge{
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      background:rgba(37,99,235,0.12);
      color:#bfdbfe;
    }

    .action-btn{
      padding:8px 12px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      font-size:12px;
      font-weight:700;
      margin-right:6px;
    }

    .edit{
      background:rgba(245,158,11,0.15);
      color:#fde68a;
    }

    .delete{
      background:rgba(239,68,68,0.15);
      color:#fecaca;
    }

    @media(max-width:1200px){
      .grid{
        grid-template-columns:1fr;
      }

      .form-card{
        position:static;
      }
    }
  </style>
</head>
<body>

<div class="container">

  <!-- TOPBAR -->
  <div class="topbar">
    <div>
      <h1>Question Bank Management</h1>
      <p>Create, map, edit and manage MCQs with Course Outcomes</p>
    </div>

    <div class="nav-buttons">
      <button class="btn btn-primary" onclick="goDashboard()">Dashboard</button>
      <button class="btn btn-success" onclick="exportQuestions()">Export</button>
      <button class="btn btn-danger" onclick="logoutAdmin()">Logout</button>
    </div>
  </div>

  <div class="grid">

    <!-- FORM -->
    <div class="form-card">
      <h2 id="formTitle">Add New Question</h2>

      <form id="questionForm">

        <div class="form-group">
          <label>Question</label>
          <textarea id="questionText" required placeholder="Enter full MCQ question"></textarea>
        </div>

        <div class="form-group">
          <label>Options</label>

          <div class="option-grid">
            <input type="text" id="option1" placeholder="Option 1" required>
            <input type="text" id="option2" placeholder="Option 2" required>
            <input type="text" id="option3" placeholder="Option 3" required>
            <input type="text" id="option4" placeholder="Option 4" required>
          </div>
        </div>

        <div class="form-group">
          <label>Correct Answer Index</label>
          <select id="correctAnswer" required>
            <option value="">Select Correct Option</option>
            <option value="0">Option 1</option>
            <option value="1">Option 2</option>
            <option value="2">Option 3</option>
            <option value="3">Option 4</option>
          </select>
        </div>

        <div class="form-group">
          <label>Course Outcome</label>
          <input type="text" id="courseOutcome" placeholder="e.g. CO 1.1" required>
          <div class="helper">Example: CO 1.1 / CO 2.3 / CO 4.1</div>
        </div>

        <div class="form-group">
          <label>Explanation</label>
          <textarea id="explanation" placeholder="Detailed explanation shown after exam"></textarea>
        </div>

        <button type="submit" class="btn btn-primary" style="width:100%;">
          Save Question
        </button>

      </form>
    </div>

    <!-- TABLE -->
    <div class="table-card">

      <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by question or course outcome...">
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Question</th>
              <th>CO</th>
              <th>Correct</th>
              <th>Explanation</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="questionTableBody">
          </tbody>

        </table>
      </div>

    </div>

  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    doc,
    deleteDoc,
    updateDoc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
   apiKey: "AIzaSyCxCexZLH3m2bni7wZ3Wqvs3BzJHzh9fxc",
  authDomain: "tues-2f354.firebaseapp.com",
  databaseURL: "https://tues-2f354-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tues-2f354",
  storageBucket: "tues-2f354.firebasestorage.app",
  messagingSenderId: "41087849708",
  appId: "1:41087849708:web:25c1f91d54858a2111c1c9"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  if(localStorage.getItem("adminLoggedIn") !== "true"){
    window.location.href = "admin-login.html";
  }

  let editingQuestionId = null;
  let allQuestions = [];

  const form = document.getElementById("questionForm");
  const tableBody = document.getElementById("questionTableBody");
  const searchInput = document.getElementById("searchInput");

  async function loadQuestions(){
    allQuestions = [];
    tableBody.innerHTML = "";

    const querySnapshot = await getDocs(collection(db,"questionBank"));

    let index = 1;

    querySnapshot.forEach((docSnap)=>{
      const data = docSnap.data();

      allQuestions.push({
        id: docSnap.id,
        ...data
      });

      renderQuestionRow({
        id: docSnap.id,
        ...data
      }, index++);

    });
  }

  function renderQuestionRow(question, index){
    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${index}</td>
      <td>${question.question}</td>
      <td><span class="badge">${question.courseOutcome}</span></td>
      <td>Option ${parseInt(question.correctAnswer)+1}</td>
      <td>${question.explanation || "-"}</td>
      <td>
        <button class="action-btn edit" onclick="editQuestion('${question.id}')">Edit</button>
        <button class="action-btn delete" onclick="deleteQuestion('${question.id}')">Delete</button>
      </td>
    `;

    tableBody.appendChild(row);
  }

  form.addEventListener("submit", async (e)=>{
    e.preventDefault();

    const questionData = {
      question: document.getElementById("questionText").value.trim(),
      options: [
        document.getElementById("option1").value.trim(),
        document.getElementById("option2").value.trim(),
        document.getElementById("option3").value.trim(),
        document.getElementById("option4").value.trim()
      ],
      correctAnswer: parseInt(document.getElementById("correctAnswer").value),
      courseOutcome: document.getElementById("courseOutcome").value.trim(),
      explanation: document.getElementById("explanation").value.trim(),
      createdAt: new Date().toISOString()
    };

    try{
      if(editingQuestionId){
        await updateDoc(doc(db,"questionBank",editingQuestionId),questionData);
        alert("Question updated successfully.");
        editingQuestionId = null;
        document.getElementById("formTitle").textContent = "Add New Question";
      }else{
        await addDoc(collection(db,"questionBank"),questionData);
        alert("Question added successfully.");
      }

      form.reset();
      loadQuestions();

    }catch(error){
      console.error(error);
      alert("Failed to save question.");
    }
  });

  window.deleteQuestion = async function(id){
    const confirmDelete = confirm("Delete this question permanently?");
    if(!confirmDelete) return;

    try{
      await deleteDoc(doc(db,"questionBank",id));
      loadQuestions();
    }catch(error){
      console.error(error);
      alert("Failed to delete question.");
    }
  }

  window.editQuestion = async function(id){
    try{
      const questionRef = doc(db,"questionBank",id);
      const questionSnap = await getDoc(questionRef);

      if(questionSnap.exists()){
        const data = questionSnap.data();

        document.getElementById("questionText").value = data.question;
        document.getElementById("option1").value = data.options[0];
        document.getElementById("option2").value = data.options[1];
        document.getElementById("option3").value = data.options[2];
        document.getElementById("option4").value = data.options[3];
        document.getElementById("correctAnswer").value = data.correctAnswer;
        document.getElementById("courseOutcome").value = data.courseOutcome;
        document.getElementById("explanation").value = data.explanation || "";

        editingQuestionId = id;
        document.getElementById("formTitle").textContent = "Edit Question";
        window.scrollTo({top:0,behavior:"smooth"});
      }

    }catch(error){
      console.error(error);
    }
  }

  searchInput.addEventListener("input", ()=>{
    const search = searchInput.value.toLowerCase();

    tableBody.innerHTML = "";

    const filtered = allQuestions.filter(q =>
      q.question.toLowerCase().includes(search) ||
      q.courseOutcome.toLowerCase().includes(search)
    );

    filtered.forEach((q,index)=>{
      renderQuestionRow(q,index+1);
    });
  });

  window.goDashboard = function(){
    window.location.href = "admin-dashboard.html";
  }

  window.logoutAdmin = function(){
    localStorage.clear();
    window.location.href = "admin-login.html";
  }

  window.exportQuestions = function(){
    alert("Excel/CSV export module can be connected next.");
  }

  loadQuestions();

</script>

</body>
</html>
